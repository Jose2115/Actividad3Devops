version: 0.2

phases:
  build:
    commands:
      - echo "Construyendo y ejecutando el contenedor..."
      - docker build -t mi-ejercicio-app .
      # Ejecutamos para generar los resultados y el log (Requisito d)
      - docker run --name contenedor-ejercicio -v $(pwd):/app mi-ejercicio-app
  post_build:
    commands:
      - echo "Sincronizando log con S3..."
      # REEMPLAZA 'tu-nombre-de-bucket' con el nombre real de tu bucket
      - aws s3 cp backup.log s3://actividad3-devops/backup.log

artifacts:
  files:
    - backup.log
    - resultados.json